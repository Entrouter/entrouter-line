node_id = "syd-01"
region = "syd"

[listen]
relay_addr = "0.0.0.0:4433"
tcp_addr = "0.0.0.0:8443"
quic_addr = "0.0.0.0:4434"
admin_addr = "127.0.0.1:9090"
# Optional: require bearer token for /status endpoint
# admin_token = "your-secret-token-here"
# Optional: TLS for the TCP edge (PEM format)
# If omitted, TCP edge runs plaintext.
# tls_cert_path = "/etc/entrouter/cert.pem"
# tls_key_path = "/etc/entrouter/key.pem"

[mesh]
probe_interval_ms = 500

[relay]
default_dest = "us-east-01"

# Generate keys with: openssl rand -base64 32

[[peers]]
node_id = "sgp-01"
region = "sgp"
addr = "198.51.100.1:4433"
shared_key = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

[[peers]]
node_id = "us-east-01"
region = "us-east"
addr = "203.0.113.1:4433"
shared_key = "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB="
